<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATCOM TERMINAL - OSINT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            background-color: #05070a;
            color: #e5e7eb;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            overflow: hidden;
        }

        #map {
            height: 100vh;
            width: 100%;
            background: #0a0c10;
        }

        .sidebar {
            position: absolute;
            left: 0;
            top: 0;
            width: 400px;
            height: 100vh;
            background: rgba(10, 12, 16, 0.95);
            border-right: 1px solid #1f2937;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            font-size: 0.8rem;
            color: #9ca3af;
            text-transform: uppercase;
        }

        .nav-item.active {
            background: rgba(31, 41, 55, 0.5);
            border-left-color: #ef4444;
            color: #fff;
        }

        .news-card {
            background: rgba(17, 24, 39, 0.5);
            border-left: 4px solid #374151;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }

        .news-card.israel { border-left-color: #00f2ff; }
        .news-card.iran { border-left-color: #ff8c00; }
        .news-card:hover { transform: translateX(5px); background: rgba(31, 41, 55, 0.8); }

        .stat-card {
            background: rgba(17, 24, 39, 0.5);
            border: 1px solid #1f2937;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .terminal-signature {
            padding: 15px 20px;
            border-top: 1px solid #1f2937;
            color: #4b5563;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            background: rgba(5, 7, 10, 0.95);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0a0c10; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; }

        .filter-btn {
            font-size: 10px;
            padding: 4px 12px;
            border: 1px solid #1f2937;
            cursor: pointer;
            text-transform: uppercase;
        }
        .filter-btn.active { background: #1f2937; border-color: #4b5563; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-6 border-b border-gray-800">
            <h1 class="text-xs font-bold tracking-widest text-gray-500 uppercase">Stratcom Terminal</h1>
            <div class="flex items-center mt-2">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse mr-2"></div>
                <h2 class="text-lg font-bold">LIVE INTELLIGENCE</h2>
            </div>
        </div>

        <div class="flex flex-col border-b border-gray-800">
            <div id="nav-live" class="nav-item active" onclick="switchTab('live')">🔴 Live Feed</div>
            <div id="nav-equipment" class="nav-item" onclick="switchTab('equipment')">🛡️ Equipment</div>
            <div id="nav-casualties" class="nav-item" onclick="switchTab('casualties')">💀 Casualties</div>
        </div>

        <div id="content-area" class="flex-1 overflow-y-auto p-4 custom-scrollbar">
            <div id="filter-bar" class="flex gap-2 mb-4">
                <button id="btn-all" class="filter-btn active" onclick="setFilter('all')">All Sectors</button>
                <button id="btn-israel" class="filter-btn text-cyan-400" onclick="setFilter('israel')">ISR_NEWS</button>
                <button id="btn-iran" class="filter-btn text-orange-400" onclick="setFilter('iran')">IRN_NEWS</button>
            </div>
            <div id="main-list" class="space-y-4">
                </div>
        </div>

        <div class="terminal-signature">
            <div class="flex justify-between items-center opacity-70">
                <div>
                    <p style="margin: 0;">DESIGNATOR: RARES STEFAN</p>
                    <p style="margin: 0;">OSINT_CORE_VER: 1.05 [STABLE]</p>
                </div>
                <div class="text-right">
                    <p style="margin: 0;">STATUS: ACTIVE</p>
                    <p style="margin: 0;">SYNC: CLOUD_OK</p>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([32.5, 39.0], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let currentTab = 'live';
        let currentFilter = 'all';
        let markers = [];

        async function loadData() {
            try {
                let file = 'intel_data.json';
                if (currentTab === 'equipment') file = 'equipment.json';
                if (currentTab === 'casualties') file = 'casualties.json';

                // Adaugam timestamp pentru a forta browserul sa ia fisierul nou (fara cache)
                const res = await fetch(`${file}?t=${new Date().getTime()}`);
                const data = await res.json();
                
                renderList(data);
                
                if(currentTab === 'live') {
                    updateMap(data);
                } else {
                    clearMarkers();
                }
            } catch (err) { 
                console.error("Data Fetch Error:", err);
                document.getElementById('main-list').innerHTML = `<div class="text-gray-600 text-xs uppercase p-4">Waiting for incoming data stream...</div>`;
            }
        }

        function renderList(data) {
            const list = document.getElementById('main-list');
            list.innerHTML = '';
            const filterBar = document.getElementById('filter-bar');
            filterBar.style.display = currentTab === 'live' ? 'flex' : 'none';

            if (currentTab === 'live') {
                data.filter(i => currentFilter === 'all' || i.side === currentFilter).forEach(item => {
                    const card = document.createElement('div');
                    card.className = `news-card ${item.side} p-4 rounded shadow-sm`;
                    card.innerHTML = `
                        <div class="flex justify-between text-[10px] mb-1 font-bold">
                            <span class="${item.side === 'israel' ? 'text-cyan-400' : 'text-orange-400'}">${item.side.toUpperCase()}</span>
                            <span class="text-gray-500">${new Date(item.time).toLocaleTimeString()}</span>
                        </div>
                        <h3 class="text-sm font-bold leading-tight">${item.titlu}</h3>
                        <div class="mt-2 flex justify-between items-center">
                            <span class="text-[9px] px-1 bg-gray-800 text-gray-400 border border-gray-700">${item.status.toUpperCase()}</span>
                            <a href="${item.link}" target="_blank" class="text-[9px] text-blue-400 uppercase">Source ↗</a>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } else {
                data.forEach(stat => {
                    const card = document.createElement('div');
                    card.className = "stat-card flex justify-between items-center";
                    card.innerHTML = `
                        <span class="text-xs text-gray-400 uppercase">${stat.name}</span>
                        <span class="font-bold ${currentTab === 'casualties' ? 'text-red-500' : 'text-yellow-500'}">${stat.count}</span>
                    `;
                    list.appendChild(card);
                });
            }
        }

        function clearMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
        }

        function updateMap(data) {
            clearMarkers();
            data.forEach(item => {
                if (item.lat && item.lon) {
                    const m = L.circleMarker([item.lat, item.lon], {
                        radius: 6, 
                        fillColor: item.side === 'israel' ? '#00f2ff' : '#ff8c00',
                        color: "#fff", 
                        weight: 1, 
                        fillOpacity: 0.8
                    }).addTo(map).bindPopup(`<b>${item.titlu}</b>`);
                    markers.push(m);
                }
            });
        }

        // Definim functiile pe obiectul window pentru a fi accesibile din HTML
        window.switchTab = function(tab) {
            currentTab = tab;
            
            // Update UI
            document.getElementById('nav-live').classList.toggle('active', tab === 'live');
            document.getElementById('nav-equipment').classList.toggle('active', tab === 'equipment');
            document.getElementById('nav-casualties').classList.toggle('active', tab === 'casualties');
            
            loadData();
        };

        window.setFilter = function(f) {
            currentFilter = f;
            
            // Update UI
            document.getElementById('btn-all').classList.toggle('active', f === 'all');
            document.getElementById('btn-israel').classList.toggle('active', f === 'israel');
            document.getElementById('btn-iran').classList.toggle('active', f === 'iran');
            
            loadData();
        };

        setInterval(loadData, 60000);
        loadData();
    </script>
</body>
</html>
